name: "CI/CD Deployment"

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: dev-app-repo
  TF_CLOUD_ORGANIZATION: "DigitalTech"
  TF_WORKSPACE: "gitaction_aws_container"
  SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
  SLACK_COLOR: '#36a64f'
  SLACK_MESSAGE: "Deployment started for commit: ${{ github.sha }}"
  SLACK_TITLE: "Deployment Status: STARTING"
jobs:
  # JOB 1: Ensure Infrastructure (ECR, VPC, ALB) exists
  terraform-infra:
    name: "Provision Infrastructure"
    runs-on: ubuntu-latest
    
    steps:

      - name: Checkout
        uses: actions/checkout@v4


      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply (Infra)
        # CHANGED: 'apply' instead of 'destroy' to keep infra alive
        run: terraform apply -auto-approve

  # JOB 2: Build, Push, and Update ECS
  build-and-deploy:
    name: "Build, Push and Update"
    needs: terraform-infra
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4


      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}


      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Tag Image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Build once with both the SHA and 'latest' tags
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest ./app
          
          # Push both tags to ECR
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

    
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      
      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply (Update ECS)
        # CHANGED: 'apply' with the new image_tag variable
        run: terraform apply -auto-approve -var="image_tag=${{ github.sha }}"      

        # --- SUCCESS NOTIFICATION ---
      - name: Slack Notification - Success
        if: success()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_COLOR: 'good'
          SLACK_MESSAGE: "✅ Deployment SUCCESSFUL! Your changes are live."
          SLACK_TITLE: "Deployment Status: SUCCESS"

      # --- FAILURE NOTIFICATION ---
      - name: Slack Notification - Failure
        if: failure()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_COLOR: 'danger'
          SLACK_MESSAGE: "❌ Deployment FAILED. Check GitHub Actions logs."
          SLACK_TITLE: "Deployment Status: FAILED"