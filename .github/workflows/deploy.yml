name: "CI/CD Deployment"

on:
  push:
    branches: [ main ]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: dev-app-repo
  TF_CLOUD_ORGANIZATION: "DigitalTech"
  TF_WORKSPACE: "gitaction_aws_container"
  SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
  SLACK_COLOR: '#36a64f'
  SLACK_MESSAGE: "Deployment started for commit: ${{ github.sha }}"
  SLACK_TITLE: "Deployment Status: STARTING"
jobs:
  # JOB 1: Ensure Infrastructure (ECR, VPC, ALB) exists
  terraform-infra:
    name: "1. Provision Infrastructure"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
      
      - name: Terraform Init
        run: terraform init

      # NEW STEP: Dry-run for the base infrastructure
      # - name: Terraform Plan
      #   run: terraform plan -input=false

      - name: Terraform Apply
        run: terraform destroy -auto-approve -input=false

  build-and-push:
    name: "2. Build & Push Image"
    needs: terraform-infra
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Build & Push
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest ./app
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  update-ecs:
    name: "3. Update ECS Task"
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
      
      - name: Terraform Init
        run: terraform init

      # NEW STEP: Dry-run for the ECS Task update
      # - name: Terraform Plan
      #   run: terraform plan -input=false -var="image_tag=${{ github.sha }}"

      - name: Terraform Apply
        run: terraform destroy -auto-approve -input=false -var="image_tag=${{ github.sha }}"    

        # --- SUCCESS NOTIFICATION ---
      - name: Slack Notification - Success
        if: success()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_COLOR: 'good'
          SLACK_MESSAGE: "✅ Deployment SUCCESSFUL! Your changes are live."
          SLACK_TITLE: "Deployment Status: SUCCESS"

      # --- FAILURE NOTIFICATION ---
      - name: Slack Notification - Failure
        if: failure()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_COLOR: 'danger'
          SLACK_MESSAGE: "❌ Deployment FAILED. Check GitHub Actions logs."
          SLACK_TITLE: "Deployment Status: FAILED"